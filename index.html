<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safari Lodge Menu</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="header-content">
    <h1>Safari Lodge Adama</h1>
    <p>Scan QR to view menu 🍽️</p>

    <input type="text" id="search" placeholder="Search food or drink...">
  </div>
</header>

<!-- NAV -->
<div class="nav-toggle" onclick="toggleMenu()">☰ Menu</div>

<nav id="navMenu">
  <ul>
    <li onclick="filterMenu('all')">All</li>
    <li onclick="filterMenu('breakfast')">Breakfast</li>
    <li onclick="filterMenu('lunch')">Lunch</li>
    <li onclick="filterMenu('dinner')">Dinner</li>
    <li onclick="filterMenu('drinks')">Drinks</li>
  </ul>
</nav>

<!-- MENU -->
<section class="menu">

  <div class="card breakfast">
    <img src="https://images.unsplash.com/photo-1551024601-bec78aea704b">
    <h3>Egg Breakfast</h3>
    <p>Fresh eggs, bread & tea.</p>
    <span>90 ETB</span>
  </div>

  <div class="card lunch">
    <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
    <h3>Burger</h3>
    <p>Juicy beef burger with fries.</p>
    <span>150 ETB</span>
  </div>

  <div class="card dinner">
    <img src="https://images.unsplash.com/photo-1625937759428-8b6d6d8a2b">
    <h3>Tibs</h3>
    <p>Traditional Ethiopian sautéed beef.</p>
    <span>200 ETB</span>
  </div>

  <div class="card drinks">
    <img src="https://images.unsplash.com/photo-1556679343-c7306c1976bc">
    <h3>Fresh Juice</h3>
    <p>Natural fruit juice.</p>
    <span>70 ETB</span>
  </div>

</section>

<script src="script.js"></script>
</body>
</html>
